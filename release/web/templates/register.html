{{define "content"}}
<section class="auth-section">
  <div class="container auth-wrap">
    <div class="auth-card">
      <span class="eyebrow">Регистрация</span>
      <h1>Создание аккаунта клиента</h1>
      <p class="lead small">После регистрации вы сможете оформлять заказы и отслеживать их статусы.</p>

      <form method="post" class="form-grid">
        <label>
          ФИО
          <input type="text" name="full_name" required>
        </label>

        <label>
          Телефон
          <input type="text" name="phone" required>
        </label>

        <label>
          Email
          <input type="email" name="email" required>
        </label>

        <label>
          Пароль
          <input type="password" name="password" required>
        </label>

        <button class="btn" type="submit">Создать аккаунт</button>
      </form>

      <p class="helper">Уже есть аккаунт? <a href="/login">Войти</a></p>
    </div>
  </div>
</section>
{{end}}
