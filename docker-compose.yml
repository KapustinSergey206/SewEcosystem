version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: sewing-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 73237323Qwa
      POSTGRES_DB: Sewing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sewing.sql:/docker-entrypoint-initdb.d/sewing.sql
    command: [ "postgres", "-c", "log_statement=all" ]

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: sewing-web
    working_dir: /app
    command: [ "go", "run", "./cmd/web" ]
    ports:
      - "8080:8080"
    env_file:
      - .env.docker
    volumes:
      - ./:/app
    depends_on:
      - postgres

  vkbot:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: sewing-vkbot
    working_dir: /app
    command: [ "go", "run", "./cmd/vkbot" ]
    env_file:
      - .env.docker
    volumes:
      - ./:/app
    depends_on:
      - postgres

  bot:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: sewing-bot
    working_dir: /app
    command: [ "go", "run", "./cmd/bot" ]
    env_file:
      - .env.docker
    volumes:
      - ./:/app
    depends_on:
      - postgres

volumes:
  postgres_data:
